  // ── L4 — from B3.3.1 ────────────────────────────────────────────────────────
  { id:'B3.3.1.T1', emoji:'⚡', name1:'Quickly locate your 2Hs', name2:'', n2color:'#ccff43',
    type:'Screen', status:'Live', gate:'', url:'',
    boxW:240, boxH:144, idSize:7.5, name1Size:9.5, name2Size:0,
    imgs:['https://i.postimg.cc/hvw4ZmWx/MOTH-orchid-WHITE-web-email.png'], children:[] },

  { id:'B3.3.1.T2', emoji:'🔍', name1:'Find your 2Hs', name2:'', n2color:'#ccff44',
    type:'Screen', status:'Live', gate:'', url:'',
    boxW:240, boxH:144, idSize:7.5, name1Size:9.5, name2Size:0,
    imgs:['https://i.postimg.cc/5tVbTphW/MOTH-orchid-pink-web-email.png'], children:[] },

  { id:'B3.3.1.T3', emoji:'🗂️', name1:'Directory', name2:'', n2color:'#ccff45',
    type:'External Link', status:'Live', gate:'Subscription', url:'',
    boxW:240, boxH:144, idSize:7.5, name1Size:9.5, name2Size:0,
    imgs:['https://i.postimg.cc/MZsnjcLC/Blue-Orchid-Web-Email.png'], children:[] },
];

// ── Build map ─────────────────────────────────────────────────────────────────
const MAP = {};
NODES.forEach(n => MAP[n.id] = n);

// ── Layout constants ──────────────────────────────────────────────────────────
const COL_GAP  = 480;
const ROW_GAP  = 16;
const PAD_X    = 80;
const PAD_Y    = 60;
const GATE_PAD = 18;

function nodeH(n)    { return n.boxH + (n.gate ? GATE_PAD : 0); }
function subtreeH(n) {
  if (!n.children || n.children.length === 0) return nodeH(n);
  const ch = n.children.reduce((s,id) => s + subtreeH(MAP[id]), 0)
           + (n.children.length-1) * ROW_GAP;
  return Math.max(nodeH(n), ch);
}

function assignPos(n, topY, depth) {
  n.depth = depth;
  const sh = subtreeH(n);
  n.cy = topY + sh/2;
  if (n.children && n.children.length > 0) {
    const ch = n.children.reduce((s,id) => s + subtreeH(MAP[id]),0)
             + (n.children.length-1)*ROW_GAP;
    let y = topY + (sh-ch)/2;
    n.children.forEach(id => { assignPos(MAP[id], y, depth+1); y += subtreeH(MAP[id])+ROW_GAP; });
  }
}

function computeColX() {
  const w = {}; NODES.forEach(n => { w[n.depth] = Math.max(w[n.depth]||0, n.boxW); });
  const xs = {}; let x = PAD_X;
  for (let d=0; d<=Math.max(...Object.keys(w).map(Number)); d++) { xs[d]=x; x+=(w[d]||0)+COL_GAP; }
  NODES.forEach(n => n.x = xs[n.depth]);
  return x + PAD_X;
}

function flatten(id, arr=[]) { const n=MAP[id]; arr.push(n); (n.children||[]).forEach(c=>flatten(c,arr)); return arr; }

function wrapText(text, maxW, fontSize) {
  const charW = fontSize * 0.58;
  const max   = Math.floor(maxW / charW);
  const lines = [];
  text.split('\n').forEach(para => {
    let cur='';
    para.split(' ').forEach(w => {
      const t = cur ? cur+' '+w : w;
      if (t.length > max && cur) { lines.push(cur); cur=w; } else cur=t;
    });
    if (cur) lines.push(cur);
  });
  return lines;
}

// ── Build SVG ─────────────────────────────────────────────────────────────────
function build() {
  assignPos(MAP['B0'], PAD_Y, 0);
  const totalW = computeColX();
  const all    = flatten('B0');
  const totalH = Math.max(...all.map(n => n.cy + n.boxH/2 + (n.gate ? GATE_PAD:0))) + PAD_Y;

  const svg = document.getElementById('diagram');
  svg.setAttribute('width', totalW);
  svg.setAttribute('height', totalH);

  const NS = 'http://www.w3.org/2000/svg';
  const el = (tag, attrs={}) => {
    const e = document.createElementNS(NS, tag);
    Object.entries(attrs).forEach(([k,v]) => e.setAttribute(k,v));
    return e;
  };
  const txt = (text, attrs={}) => {
    const e = el('text', attrs);
    e.textContent = text;
    return e;
  };

  // ── defs: filters + gradients ──
  const defs = el('defs');

  // Image glow filter
  const imgGlow = el('filter', { id:'glow', x:'-20%', y:'-20%', width:'140%', height:'140%' });
  const igb = el('feGaussianBlur', { stdDeviation:'2.5', result:'blur' });
  const igc = el('feComposite',    { in:'SourceGraphic', in2:'blur', operator:'over' });
  imgGlow.appendChild(igb); imgGlow.appendChild(igc);
  defs.appendChild(imgGlow);

  // Shadow blur filter for button shadow rects
  const shadowFilt = el('filter', { id:'shadowBlur', x:'-15%', y:'-15%', width:'135%', height:'140%' });
  shadowFilt.appendChild(el('feGaussianBlur', { in:'SourceGraphic', stdDeviation:'6' }));
  defs.appendChild(shadowFilt);

  // Inner highlight gradient (top shimmer to give bevelled feel)
  // We create one per type colour
  Object.entries(TYPE).forEach(([typeName, t]) => {
    const gid = 'shine_' + typeName.replace(/\s+/g,'_');
    const grad = el('linearGradient', { id: gid, x1:'0', y1:'0', x2:'0', y2:'1' });
    const s1 = el('stop', { offset:'0%',   'stop-color':'rgba(255,255,255,0.18)' });
    const s2 = el('stop', { offset:'45%',  'stop-color':'rgba(255,255,255,0.05)' });
    const s3 = el('stop', { offset:'100%', 'stop-color':'rgba(0,0,0,0.12)' });
    grad.appendChild(s1); grad.appendChild(s2); grad.appendChild(s3);
    defs.appendChild(grad);
  });

  svg.appendChild(defs);

  // ── Connectors ──
  all.forEach(n => {
    if (!n.children || !n.children.length) return;
    const px = n.x + n.boxW, py = n.cy, mx = px + COL_GAP/2;
    n.children.forEach(cid => {
      const c = MAP[cid];
      svg.appendChild(el('path',{fill:'none',stroke:'rgba(255,200,60,0.75)','stroke-width':'2',
        d:`M ${px} ${py} H ${mx} V ${c.cy} H ${c.x}`}));
      svg.appendChild(el('polygon',{
        points:`${c.x},${c.cy} ${c.x-9},${c.cy-5} ${c.x-9},${c.cy+5}`,
        fill:'rgba(255,200,60,0.85)'}));
    });
  });

  // ── Nodes ──
  all.forEach(n => {
    const t    = TYPE[n.type] || TYPE['Screen'];
    const nx   = n.x, ny = n.cy - n.boxH/2;
    const soon = n.status === 'Soon';
    const rx   = 10; // rounded corners — slightly more for button feel
    const shineId = 'shine_' + n.type.replace(/\s+/g,'_');

    const g = el('g', { opacity: soon ? '0.42' : '1', style: 'cursor:' + (n.url ? 'pointer' : 'default') });

    // ── Drop shadow rect ──
    g.appendChild(el('rect', {
      x: nx+3, y: ny+6, width: n.boxW, height: n.boxH, rx,
      fill: t.shadow || 'rgba(0,0,0,0.4)',
      filter: 'url(#shadowBlur)',
      opacity: '0.7'
    }));

    // ── Main box ──
    g.appendChild(el('rect', {
      x:nx, y:ny, width:n.boxW, height:n.boxH, rx,
      fill: t.bg,
      stroke: t.border,
      'stroke-width': 2
    }));

    // ── Top-edge highlight (inner bevel shimmer) ──
    g.appendChild(el('rect', {
      x:nx+1, y:ny+1, width:n.boxW-2, height:n.boxH-2, rx: rx-1,
      fill: `url(#${shineId})`,
      opacity: '1',
      'pointer-events': 'none'
    }));

    // ── Hover interaction (only for nodes with URL) ──
    if (n.url) {
      const hitBox = el('rect', {
        x:nx, y:ny, width:n.boxW, height:n.boxH, rx,
        fill:'transparent', style:'cursor:pointer'
      });
      hitBox.addEventListener('click', () => window.open(n.url, '_blank'));
      hitBox.addEventListener('mouseenter', () => {
        g.style.transform = `translate(0px, -2px)`;
        g.style.transition = 'transform 0.12s ease';
      });
      hitBox.addEventListener('mouseleave', () => {
        g.style.transform = '';
      });
      g.appendChild(hitBox);
    }

    // ── ID text (top-left, Cinzel, gray #b7b7b7) ──
    g.appendChild(txt(n.id, {
      x: nx+9, y: ny + n.idSize + 6,
      'font-family':'Cinzel, serif', 'font-size': n.idSize,
      fill: ID_COLOR, 'text-anchor':'start', 'pointer-events':'none'
    }));

    // ── Name block: Emoji + Name1 + Name2 ALL ON THE SAME LINE ──
    const n1lineH   = n.name1Size * 1.3;
    const n1startY  = ny + n.idSize + 12 + n.name1Size;
    const name1text = (n.emoji ? n.emoji+' ' : '') + n.name1;
    const n1lines   = wrapText(name1text, n.boxW - 18, n.name1Size);

    for (let i = 0; i < n1lines.length - 1; i++) {
      const lt = el('text', { x: nx+9, y: n1startY + i*n1lineH, 'text-anchor':'start', 'pointer-events':'none' });
      const sp = document.createElementNS(NS, 'tspan');
      sp.setAttribute('font-family', 'Cinzel, serif');
      sp.setAttribute('font-size', n.name1Size);
      sp.setAttribute('font-weight', 600);
      sp.setAttribute('fill', t.name1);
      sp.textContent = n1lines[i];
      lt.appendChild(sp);
      g.appendChild(lt);
    }

    // Last line: Name1 + Name2 inline
    const lastLineY   = n1startY + (n1lines.length - 1) * n1lineH;
    const lastLineTxt = el('text', { x: nx+9, y: lastLineY, 'text-anchor':'start', 'pointer-events':'none' });

    const n1span = document.createElementNS(NS, 'tspan');
    n1span.setAttribute('font-family', 'Cinzel, serif');
    n1span.setAttribute('font-size', n.name1Size);
    n1span.setAttribute('font-weight', 600);
    n1span.setAttribute('fill', t.name1);
    n1span.textContent = n1lines[n1lines.length - 1];
    lastLineTxt.appendChild(n1span);

    if (n.name2 && n.name2Size > 0) {
      const n2span = document.createElementNS(NS, 'tspan');
      n2span.setAttribute('font-family', "'Grey Qo', cursive");
      n2span.setAttribute('font-size', n.name2Size);
      n2span.setAttribute('font-weight', 600);
      n2span.setAttribute('fill', n.n2color);
      // Align baselines: Grey Qo is taller so shift it down slightly
      n2span.setAttribute('dy', ((n.name2Size - n.name1Size) * 0.22).toFixed(1));
      n2span.textContent = ' ' + n.name2;
      lastLineTxt.appendChild(n2span);
    }
    g.appendChild(lastLineTxt);

    const n1bottom = lastLineY + n.name1Size * 0.4;

    // ── Images ──
    if (n.imgs && n.imgs.length > 0) {
      const imgAreaTop = n1bottom + 10;
      const imgAreaBot = ny + n.boxH - 10;
      const imgH       = Math.max(imgAreaBot - imgAreaTop, 8);
      const slotW      = imgH;
      const totalImgW  = n.imgs.length * slotW + (n.imgs.length-1) * 6;
      const imgStartX  = nx + (n.boxW - totalImgW) / 2;

      n.imgs.forEach((src, i) => {
        g.appendChild(el('image', {
          href: src,
          x: imgStartX + i*(slotW+6), y: imgAreaTop,
          width: slotW, height: imgH,
          preserveAspectRatio: 'xMidYMid meet',
          filter: 'url(#glow)',
          'pointer-events': 'none'
        }));
      });
    }

    // ── Gate text ──
    if (n.gate) {
      g.appendChild(txt('🔒 '+n.gate, {
        x: nx + n.boxW/2, y: ny + n.boxH + 13,
        'font-family':'Noto Sans, Arial, sans-serif',
        'font-size': GATE_SIZE, 'font-style':'italic',
        fill: GATE_COLOR, 'text-anchor':'middle', 'pointer-events':'none'
      }));
    }

    // ── SOON tag ──
    if (soon) {
      g.appendChild(txt('SOON', {
        x: nx + n.boxW - 9, y: ny + 14,
        'font-family':'Cinzel, serif', 'font-size':9, 'font-weight':700,
        fill:'#999', 'text-anchor':'end', 'letter-spacing':'0.1em', 'pointer-events':'none'
      }));
    }

    // ── Link indicator (bottom-right corner) ──
    if (n.url) {
      g.appendChild(txt('↗', {
        x: nx + n.boxW - 7, y: ny + n.boxH - 7,
        'font-family':'Arial, sans-serif', 'font-size': Math.max(n.idSize * 0.9, 9),
        fill:'rgba(255,255,180,0.7)', 'text-anchor':'end', 'pointer-events':'none'
      }));
    }

    svg.appendChild(g);
  });
}

document.fonts.ready.then(() => {
  build();

  // ── Pan & Zoom engine ────────────────────────────────────────────────────
  const wrap   = document.getElementById('wrap');
  const canvas = document.getElementById('canvas');
  const svg    = document.getElementById('diagram');
  let scale = 1, tx = 0, ty = 0;
  let dragging = false, startX, startY, startTx, startTy;

  function applyTransform() {
    canvas.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
    document.getElementById('zoom-label').textContent = Math.round(scale*100)+'%';
  }

  function fitToScreen() {
    const svgW = parseFloat(svg.getAttribute('width'))  || 2000;
    const svgH = parseFloat(svg.getAttribute('height')) || 6000;
    const wrapW = wrap.clientWidth;
    const wrapH = wrap.clientHeight;
    scale = Math.min(wrapH / svgH, wrapW / svgW, 1);
    tx = (wrapW - svgW * scale) / 2;
    ty = 0;
    applyTransform();
  }

  window.zoom = (delta) => {
    const wrapW = wrap.clientWidth, wrapH = wrap.clientHeight;
    const cx = wrapW / 2, cy = wrapH / 2;
    const newScale = Math.min(Math.max(scale + delta, 0.05), 4);
    tx = cx - (cx - tx) * (newScale / scale);
    ty = cy - (cy - ty) * (newScale / scale);
    scale = newScale;
    applyTransform();
  };

  window.resetView = fitToScreen;

  // Mouse wheel zoom
  wrap.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = wrap.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const delta = e.deltaY < 0 ? 0.12 : -0.12;
    const newScale = Math.min(Math.max(scale + delta, 0.05), 4);
    tx = mx - (mx - tx) * (newScale / scale);
    ty = my - (my - ty) * (newScale / scale);
    scale = newScale;
    applyTransform();
  }, { passive: false });

  // Touch pinch zoom
  let lastDist = null;
  wrap.addEventListener('touchstart', e => {
    if (e.touches.length === 2) lastDist = null;
    else if (e.touches.length === 1) {
      dragging = true;
      startX = e.touches[0].clientX; startY = e.touches[0].clientY;
      startTx = tx; startTy = ty;
    }
  });
  wrap.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (lastDist) {
        const delta = (dist - lastDist) * 0.005;
        const newScale = Math.min(Math.max(scale + delta, 0.05), 4);
        const rect = wrap.getBoundingClientRect();
        const cx = (e.touches[0].clientX + e.touches[1].clientX)/2 - rect.left;
        const cy = (e.touches[0].clientY + e.touches[1].clientY)/2 - rect.top;
        tx = cx - (cx - tx) * (newScale / scale);
        ty = cy - (cy - ty) * (newScale / scale);
        scale = newScale;
        applyTransform();
      }
      lastDist = dist;
    } else if (e.touches.length === 1 && dragging) {
      tx = startTx + e.touches[0].clientX - startX;
      ty = startTy + e.touches[0].clientY - startY;
      applyTransform();
    }
  }, { passive: false });
  wrap.addEventListener('touchend', () => { dragging = false; lastDist = null; });

  // Mouse drag pan
  wrap.addEventListener('mousedown', e => {
    dragging = true; wrap.classList.add('grabbing');
    startX = e.clientX; startY = e.clientY; startTx = tx; startTy = ty;
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    tx = startTx + e.clientX - startX;
    ty = startTy + e.clientY - startY;
    applyTransform();
  });
  window.addEventListener('mouseup', () => { dragging = false; wrap.classList.remove('grabbing'); });

  // Initial fit
  fitToScreen();
});
</script>
</body>
